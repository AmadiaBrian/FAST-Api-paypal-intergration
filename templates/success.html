<!DOCTYPE html>
<html lang="en">
<head>
  <title>Payment Success</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="alert alert-success text-center">
        <h2><i class="bi bi-check-circle"></i> Payment Successful!</h2>
        <p class="mb-0">Thank you for your purchase</p>
      </div>
      
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Payment Details</h5>
        </div>
        <div class="card-body">
          <div id="loading" class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Processing payment...</p>
          </div>
          
          <div id="payment-details" style="display: none;">
            <table class="table table-bordered">
              <tbody>
                <tr>
                  <td><strong>Order ID</strong></td>
                  <td id="order-id">{{ token }}</td>
                </tr>
                <tr>
                  <td><strong>Product</strong></td>
                  <td>Course Purchase</td>
                </tr>
                <tr>
                  <td><strong>Amount</strong></td>
                  <td>${{ amount }} USD</td>
                </tr>
                <tr>
                  <td><strong>Payment Status</strong></td>
                  <td id="status"></td>
                </tr>
              </tbody>
            </table>
            
            <div class="text-center mt-4">
              <a href="/" class="btn btn-primary">Return to Home</a>
            </div>
          </div>
          
          <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script>
const token = "{{ token }}";
const amount = "{{ amount }}";

async function capturePayment() {
  try {
    const res = await fetch(`/capture/${token}?amount=${amount}`, {
      method: "POST"
    });
    
    document.getElementById('loading').style.display = 'none';
    
    // Check if response is OK
    if (!res.ok) {
      const text = await res.text();
      document.getElementById('error-message').style.display = 'block';
      document.getElementById('error-message').textContent = 
        'Server Error (' + res.status + '): ' + text.substring(0, 200);
      return;
    }
    
    // Try to parse as JSON
    let data;
    try {
      data = await res.json();
    } catch (e) {
      const text = await res.text();
      document.getElementById('error-message').style.display = 'block';
      document.getElementById('error-message').textContent = 
        'Invalid JSON response: ' + text.substring(0, 200);
      return;
    }
    
    if (data.status === 'COMPLETED' || data.status === 'APPROVED') {
      document.getElementById('payment-details').style.display = 'block';
      document.getElementById('status').innerHTML = 
        '<span class="badge bg-success">' + data.status + '</span>';
    } else if (data.status === 'ALREADY_CAPTURED') {
      document.getElementById('payment-details').style.display = 'block';
      document.getElementById('status').innerHTML = 
        '<span class="badge bg-warning">Already Captured</span>';
    } else if (data.status === 'ERROR') {
      document.getElementById('error-message').style.display = 'block';
      document.getElementById('error-message').textContent = 
        'Error: ' + (data.message || 'Unknown error');
    } else {
      document.getElementById('error-message').style.display = 'block';
      document.getElementById('error-message').textContent = 
        'Payment Status: ' + data.status;
    }
  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-message').style.display = 'block';
    document.getElementById('error-message').textContent = 
      'Error processing payment: ' + error.message;
  }
}

// Auto-capture payment on page load
capturePayment();
</script>

</body>
</html>
