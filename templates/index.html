<!DOCTYPE html>
<html lang="en">
<head>
  <title>Course Purchase</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <div class="card">
        <div class="card-body text-center">
          <h2 class="card-title mb-4">Front End Development Course</h2>
          
          <div class="mb-4">
            <img src="/uploads/front-end-developer.svg" 
                 class="img-fluid rounded" alt="Course Image" style="max-height: 200px;">
          </div>
          
          <div class="mb-4">
            <label for="amount" class="form-label">Enter Amount (USD)</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text">$</span>
              <input type="number" id="amount" class="form-control" placeholder="10.00" min="1" step="0.01" value="10.00">
              <span class="input-group-text">USD</span>
            </div>
          </div>
          
          <p class="text-muted mb-4">
            Learn modern front-end development with hands-on projects
          </p>
          
          <button onclick="pay()" class="btn btn-primary btn-lg w-100" id="pay-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#003087" class="me-2">
              <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.152-.04.23-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106h-2.19c-.524 0-.968-.382-1.05-.9l.983-5.05c.023-.143.047-.288.077-.437.983-5.05 4.349-6.797 8.647-6.797h2.19c.524 0 .968-.382 1.05-.9l.983-5.05c.023-.143.047-.288.077-.437z"/>
            </svg>
            Pay with PayPal
          </button>
          
          <div id="status" class="mt-3"></div>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script>
async function pay() {
  const button = document.getElementById("pay-button");
  const status = document.getElementById("status");
  const amountInput = document.getElementById("amount");
  
  const amount = parseFloat(amountInput.value);
  
  if (isNaN(amount) || amount <= 0) {
    status.innerHTML = '<div class="alert alert-danger">Please enter a valid amount</div>';
    return;
  }
  
  button.disabled = true;
  button.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
  status.innerHTML = '<div class="alert alert-info">Creating order...</div>';

  try {
    const res = await fetch("/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount: amount })
    });

    const data = await res.json();

    if (data.approve_link) {
      status.innerHTML = '<div class="alert alert-success">Redirecting to PayPal...</div>';
      window.location.href = data.approve_link;
    } else {
      status.innerHTML = '<div class="alert alert-danger">Error creating payment order</div>';
      button.disabled = false;
      button.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#003087" class="me-2">
          <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.152-.04.23-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106h-2.19c-.524 0-.968-.382-1.05-.9l.983-5.05c.023-.143.047-.288.077-.437.983-5.05 4.349-6.797 8.647-6.797h2.19c.524 0 .968-.382 1.05-.9l.983-5.05c.023-.143.047-.288.077-.437z"/>
        </svg>
        Pay with PayPal
      `;
    }
  } catch (error) {
    status.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
    button.disabled = false;
    button.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#003087" class="me-2">
        <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.152-.04.23-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106h-2.19c-.524 0-.968-.382-1.05-.9l.983-5.05c.023-.143.047-.288.077-.437.983-5.05 4.349-6.797 8.647-6.797h2.19c.524 0 .968-.382 1.05-.9l.983-5.05c.023-.143.047-.288.077-.437z"/>
      </svg>
      Pay with PayPal
    `;
  }
}
</script>

</body>
</html>
